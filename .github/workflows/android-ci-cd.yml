name: Android CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --stacktrace

      - name: Run Unit Tests
        run: ./gradlew test --stacktrace

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/

      - name: Generate APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v3
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Lint
        run: ./gradlew lint

      - name: Upload Lint Results
        uses: actions/upload-artifact@v3
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html

  deploy-preview:
    name: Deploy Preview Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    needs: [build, lint]

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release Bundle
        run: ./gradlew bundleRelease

      - name: Sign Bundle
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release/
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          signingKeyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          signingKeyAlias: ${{ secrets.KEY_ALIAS }}
          signingKeyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Bundle to Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.agriculture.siridhanya
          releaseFiles: app/build/outputs/bundle/release/**/*.aab
          track: internal
          status: completed

      - name: Create Deployment Annotation
        run: |
          echo "✅ Preview build deployed to Google Play Internal Track"
          echo "Version: ${{ github.sha }}"
          echo "Branch: develop"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && startsWith(github.ref, 'refs/tags/v')
    needs: [build, lint]

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release Bundle
        run: ./gradlew bundleRelease

      - name: Sign Bundle
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release/
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          signingKeyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          signingKeyAlias: ${{ secrets.KEY_ALIAS }}
          signingKeyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Bundle to Play Store (Production)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.agriculture.siridhanya
          releaseFiles: app/build/outputs/bundle/release/**/*.aab
          track: production
          status: completed

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/bundle/release/**/*.aab
            app/build/outputs/apk/release/**/*.apk
          body: |
            ## Release Notes
            Production release ${{ github.ref_name }}

            ### Changes
            - See commit history for detailed changes

            ### Installation
            App is now live on [Google Play Store](https://play.google.com/store/apps/details?id=com.agriculture.siridhanya)
